      function buildChapterXhtml(title, bodyContent) {
        return `<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
  <title>${escapeXml(title)}</title>
  <link rel="stylesheet" type="text/css" href="../styles.css"/>
</head>
<body>
  <h1>${escapeXml(title)}</h1>
  ${bodyContent || ""}
</body>
</html>`;
      }

      function buildTocXhtml(chapterFiles) {
        const items = chapterFiles
          .map((chapter) => `      <li><a href="${chapter.href}">${escapeXml(chapter.title)}</a></li>`)
          .join("\n");
        return `<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:epub="http://www.idpf.org/2007/ops">
<head><title>Table of Contents</title></head>
<body>
  <nav epub:type="toc">
    <h1>Table of Contents</h1>
    <ol>
${items}
    </ol>
  </nav>
</body>
</html>`;
      }

      function buildTocNcx(chapterFiles, title, uuid) {
        const navPoints = chapterFiles
          .map(
            (chapter, index) => `    <navPoint id="${chapter.id}" playOrder="${index + 1}">
      <navLabel><text>${escapeXml(chapter.title)}</text></navLabel>
      <content src="${chapter.href}"/>
    </navPoint>`
          )
          .join("\n");

        return `<?xml version="1.0" encoding="UTF-8"?>
<ncx xmlns="http://www.daisy.org/z3986/2005/ncx/" version="2005-1">
  <head>
    <meta name="dtb:uid" content="urn:uuid:${escapeXml(uuid)}"/>
  </head>
  <docTitle><text>${escapeXml(title)}</text></docTitle>
  <navMap>
${navPoints}
  </navMap>
</ncx>`;
      }

      function buildContentOpf(params) {
        const metadata = project.metadata;
        const nowIso = new Date().toISOString().replace(/\.\d{3}Z$/, "Z");
        const optionalMetadata = [];
        if (metadata.description.trim()) optionalMetadata.push(`    <dc:description>${escapeXml(metadata.description)}</dc:description>`);
        if (metadata.publisher.trim()) optionalMetadata.push(`    <dc:publisher>${escapeXml(metadata.publisher)}</dc:publisher>`);
        if (metadata.rights.trim()) optionalMetadata.push(`    <dc:rights>${escapeXml(metadata.rights)}</dc:rights>`);
        if (metadata.date.trim()) optionalMetadata.push(`    <dc:date>${escapeXml(metadata.date)}</dc:date>`);

        const manifestItems = [
          `    <item id="nav" href="toc.xhtml" media-type="application/xhtml+xml" properties="nav"/>`,
          `    <item id="ncx" href="toc.ncx" media-type="application/x-dtbncx+xml"/>`,
          `    <item id="css" href="styles.css" media-type="text/css"/>`
        ];

        params.chapters.forEach((chapter) => {
          manifestItems.push(
            `    <item id="${chapter.id}" href="${chapter.href}" media-type="application/xhtml+xml"/>`
          );
        });

        params.images.forEach((image, index) => {
          manifestItems.push(
            `    <item id="img-${String(index + 1).padStart(3, "0")}" href="images/${image.filename}" media-type="${escapeXml(image.mimeType)}"/>`
          );
        });

        const metadataExtras = [...optionalMetadata];
        if (params.coverFile) {
          manifestItems.push(
            `    <item id="cover-image" href="images/${params.coverFile.filename}" media-type="${escapeXml(params.coverFile.mimeType)}" properties="cover-image"/>`
          );
          metadataExtras.push(`    <meta name="cover" content="cover-image"/>`);
        }

        const spineItems = params.chapters
          .map((chapter) => `    <itemref idref="${chapter.id}"/>`)
          .join("\n");

        return `<?xml version="1.0" encoding="UTF-8"?>
<package xmlns="http://www.idpf.org/2007/opf" version="3.0" unique-identifier="bookid">
  <metadata xmlns:dc="http://purl.org/dc/elements/1.1/">
    <dc:identifier id="bookid">urn:uuid:${escapeXml(params.uuid)}</dc:identifier>
    <dc:title>${escapeXml(params.title)}</dc:title>
    <dc:creator>${escapeXml(params.author)}</dc:creator>
    <dc:language>${escapeXml(params.language)}</dc:language>
    <meta property="dcterms:modified">${nowIso}</meta>
${metadataExtras.join("\n")}
  </metadata>
  <manifest>
${manifestItems.join("\n")}
  </manifest>
  <spine toc="ncx">
${spineItems}
  </spine>
</package>`;
      }

      function buildCoverExportFile() {
        const cover = project.metadata.coverImage;
        if (!cover) return null;
        const extension = extensionFromMime(cover.mimeType) || extensionFromFilename(cover.filename) || "jpg";
        return {
          filename: `cover.${extension}`,
          mimeType: cover.mimeType,
          base64: cover.base64
        };
      }

      async function importProjectJson(event) {
        const file = event.target.files && event.target.files[0];
        event.target.value = "";
        if (!file) return;
        try {
          const text = await file.text();
          const parsed = JSON.parse(text);
          project = normalizeProject(parsed);
          currentChapterId = project.chapters[0].id;
          renderAll();
          forceSaveNow();
          showToast("Project JSON imported.", "success");
        } catch (error) {
          console.error(error);
          showToast("Invalid project JSON.", "error");
        }
      }

      function exportProjectJson() {
        persistCurrentChapterContent();
        const payload = JSON.stringify(project, null, 2);
        const title = project.metadata.title.trim() || "epub-project";
        const fileName = `${slugifyFilename(title)}.json`;
        localStorage.setItem(BACKUP_NAME_KEY, fileName);
        const blob = new Blob([payload], { type: "application/json;charset=utf-8" });
        window.saveAs(blob, fileName);
        showToast("Project JSON exported.", "success");
      }

      async function importEpub(event) {
        const file = event.target.files && event.target.files[0];
        event.target.value = "";
        if (!file) return;
        try {
          const imported = await parseEpubFile(file);
          project = imported;
          currentChapterId = project.chapters[0].id;
          renderAll();
          forceSaveNow();
          showToast("EPUB imported.", "success");
        } catch (error) {
          console.error(error);
          showToast("EPUB import failed: " + error.message, "error");
        }
      }

      async function parseEpubFile(file) {
        const zip = await window.JSZip.loadAsync(file);
        const mimetypeEntry = zip.file("mimetype");
        if (!mimetypeEntry) {
          throw new Error("Missing mimetype file.");
        }
        const mimetype = (await mimetypeEntry.async("string")).trim();
        if (mimetype !== "application/epub+zip") {
          throw new Error("Unsupported mimetype.");
        }

        const containerEntry = zip.file("META-INF/container.xml");
        if (!containerEntry) {
          throw new Error("Missing META-INF/container.xml.");
        }
        const containerXml = await containerEntry.async("string");
        const containerDoc = parseXmlOrThrow(containerXml, "container.xml");
        const rootfile = findFirstByLocalName(containerDoc, "rootfile");
        if (!rootfile) throw new Error("container.xml missing rootfile.");

        const opfPath = rootfile.getAttribute("full-path");
        if (!opfPath) throw new Error("container.xml missing package path.");
        const opfEntry = zip.file(normalizeZipPath(opfPath));
        if (!opfEntry) throw new Error("Package file not found: " + opfPath);

        const opfText = await opfEntry.async("string");
        const opfDoc = parseXmlOrThrow(opfText, "content.opf");
        const opfDir = dirnameZipPath(opfPath);

        const metadataNode = findFirstByLocalName(opfDoc, "metadata");
        const manifestNode = findFirstByLocalName(opfDoc, "manifest");
        const spineNode = findFirstByLocalName(opfDoc, "spine");
        if (!metadataNode || !manifestNode || !spineNode) {
          throw new Error("OPF missing metadata/manifest/spine.");
        }

        const metadata = {
          title: readChildText(metadataNode, "title"),
          author: readChildText(metadataNode, "creator"),
          language: readChildText(metadataNode, "language") || "en",
          description: readChildText(metadataNode, "description"),
          publisher: readChildText(metadataNode, "publisher"),
          date: readChildText(metadataNode, "date"),
          rights: readChildText(metadataNode, "rights"),
          coverImage: null
        };

        const identifier = readChildText(metadataNode, "identifier");
        const uuid = extractUuid(identifier) || generateUuid();

        const manifestItems = Array.from(manifestNode.children)
          .filter((node) => node.localName === "item")
          .map((node) => {
            const href = node.getAttribute("href") || "";
            const mediaType = node.getAttribute("media-type") || "";
            const id = node.getAttribute("id") || "";
            const properties = node.getAttribute("properties") || "";
            return {
              id,
              href,
              mediaType,
              properties,
              fullPath: resolveZipPath(opfDir, href)
            };
          });

        const manifestById = new Map(manifestItems.map((item) => [item.id, item]));
        const imageItems = manifestItems.filter((item) => item.mediaType.startsWith("image/"));
        const imagesByPath = new Map();
        const importedImages = [];

        for (const item of imageItems) {
          const entry = zip.file(item.fullPath);
          if (!entry) continue;
          const base64 = await entry.async("base64");
          const bytes = base64ToUint8Array(base64);
          const hash = await hashBase64(base64);
          const filename = ensureUniqueFilename(
            sanitizeFilename(basenameZipPath(item.href) || `image.${extensionFromMime(item.mediaType)}`),
            importedImages.map((image) => image.filename)
          );
          const imageRecord = {
            id: filename.replace(/\.[^.]+$/, ""),
            filename,
            mimeType: item.mediaType,
            base64: uint8ArrayToBase64(bytes),
            hash
          };
          importedImages.push(imageRecord);
          imagesByPath.set(normalizeZipPath(item.fullPath), imageRecord);

          if (item.properties.includes("cover-image")) {
            metadata.coverImage = {
              filename,
              mimeType: item.mediaType,
              base64: imageRecord.base64
            };
          }
        }

        const spineRefs = Array.from(spineNode.children)
          .filter((node) => node.localName === "itemref")
          .map((node) => node.getAttribute("idref"))
          .filter(Boolean);

        const chapterItems = [];
        spineRefs.forEach((idref, index) => {
          const item = manifestById.get(idref);
          if (!item || !item.href.toLowerCase().endsWith(".xhtml")) return;
          chapterItems.push({ ...item, index });
        });

        if (!chapterItems.length) {
          manifestItems
            .filter((item) => item.mediaType === "application/xhtml+xml" && !item.properties.includes("nav"))
            .forEach((item, index) => {
              chapterItems.push({ ...item, index });
            });
        }

        if (!chapterItems.length) {
          throw new Error("No readable chapters in EPUB.");
        }

        const chapters = [];
        for (let i = 0; i < chapterItems.length; i += 1) {
          const item = chapterItems[i];
          const entry = zip.file(item.fullPath);
          if (!entry) continue;
          const xhtml = await entry.async("string");
          const chapterDoc = new DOMParser().parseFromString(xhtml, "text/html");
          const titleFromHead =
            (chapterDoc.querySelector("title") && chapterDoc.querySelector("title").textContent) || "";
          const heading = chapterDoc.querySelector("h1");
          const chapterTitle = (heading && heading.textContent) || titleFromHead || `Chapter ${i + 1}`;
          const body = chapterDoc.body;
          const chapterDir = dirnameZipPath(item.fullPath);

          if (body) {
            Array.from(body.querySelectorAll("img")).forEach((img) => {
              const src = img.getAttribute("src") || "";
              if (!src) return;
              if (src.startsWith("data:image/")) return;
              const resolved = resolveZipPath(chapterDir, src);
              const found = imagesByPath.get(resolved);
              if (found) {
                img.setAttribute("src", `data:${found.mimeType};base64,${found.base64}`);
              } else {
                img.remove();
              }
            });
          }

          const bodyHtml = body ? body.innerHTML : "";
          chapters.push({
            id: `chapter-${String(i + 1).padStart(3, "0")}`,
            title: chapterTitle.trim() || `Chapter ${i + 1}`,
            contentHtml: sanitizeHtml(bodyHtml),
            contentMarkdown: "",
            editorMode: "richtext",
            order: i
          });
        }

        if (!chapters.length) {
          chapters.push(createDefaultProject().chapters[0]);
        }

        return normalizeProject({
          version: PROJECT_VERSION,
          uuid,
          metadata,
          chapters,
          images: importedImages
        });
      }

      function parseXmlOrThrow(xmlText, label) {
        const doc = new DOMParser().parseFromString(xmlText, "application/xml");
        const parserError = doc.getElementsByTagName("parsererror")[0];
        if (parserError) {
          throw new Error(`Invalid XML in ${label}.`);
        }
        return doc;
      }

      function findFirstByLocalName(root, localName) {
        const all = root.getElementsByTagName("*");
        for (let i = 0; i < all.length; i += 1) {
          if (all[i].localName === localName) return all[i];
        }
        return null;
      }

      function readChildText(parent, localName) {
        if (!parent) return "";
        const children = parent.getElementsByTagName("*");
        for (let i = 0; i < children.length; i += 1) {
          const child = children[i];
          if (child.localName === localName) {
            return (child.textContent || "").trim();
          }
        }
        return "";
      }

      function extractUuid(identifier) {
        if (!identifier) return "";
        const uuidMatch = /urn:uuid:([0-9a-fA-F-]{36})/.exec(identifier);
        if (uuidMatch) return uuidMatch[1];
        const rawMatch = /([0-9a-fA-F-]{36})/.exec(identifier);
        return rawMatch ? rawMatch[1] : "";
      }

      function dirnameZipPath(path) {
        const normalized = normalizeZipPath(path);
        const index = normalized.lastIndexOf("/");
        return index >= 0 ? normalized.slice(0, index + 1) : "";
      }

      function basenameZipPath(path) {
        const normalized = normalizeZipPath(path);
        const index = normalized.lastIndexOf("/");
        return index >= 0 ? normalized.slice(index + 1) : normalized;
      }

      function normalizeZipPath(path) {
        const value = String(path || "")
          .replace(/\\/g, "/")
          .split(/[?#]/)[0];
        const parts = value.split("/");
        const stack = [];
        for (const part of parts) {
          if (!part || part === ".") continue;
          if (part === "..") {
            stack.pop();
          } else {
            stack.push(part);
          }
        }
        return stack.join("/");
      }

      function resolveZipPath(baseDir, relativePath) {
        const relative = String(relativePath || "");
        if (!relative) return normalizeZipPath(baseDir);
        if (/^[a-z][a-z0-9+.-]*:/i.test(relative)) {
          return normalizeZipPath(relative);
        }
        if (relative.startsWith("/")) {
          return normalizeZipPath(relative.slice(1));
        }
        return normalizeZipPath(`${baseDir}${relative}`);
      }

      function createNewProject() {
        const shouldReset = window.confirm("Start a new project and clear current content?");
        if (!shouldReset) return;
        project = createDefaultProject();
        currentChapterId = project.chapters[0].id;
        clearValidationErrors();
        renderAll();
        forceSaveNow();
        showToast("New project created.", "success");
      }

      function toggleTheme() {
        const isDark = document.body.classList.toggle("theme-dark");
        localStorage.setItem(THEME_KEY, isDark ? "dark" : "light");
        elements.themeToggleBtn.textContent = isDark ? "Light Mode" : "Dark Mode";
      }

      function applyStoredTheme() {
        const theme = localStorage.getItem(THEME_KEY);
        const isDark = theme === "dark";
        document.body.classList.toggle("theme-dark", isDark);
        elements.themeToggleBtn.textContent = isDark ? "Light Mode" : "Dark Mode";
      }

      function showToast(message, variant = "success") {
        const toast = document.createElement("div");
        toast.className = `toast ${variant}`;
        toast.textContent = message;
        elements.toastStack.appendChild(toast);
        setTimeout(() => {
          toast.remove();
        }, 3500);
      }

      function escapeXml(value) {
        return String(value || "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&apos;");
      }

      function escapeHtml(value) {
        return escapeXml(value);
      }

      function extensionFromFilename(filename) {
        const match = /\.([a-zA-Z0-9]+)$/.exec(filename || "");
        return match ? match[1].toLowerCase() : "";
      }

      function extensionFromMime(mimeType) {
        const map = {
          "image/jpeg": "jpg",
          "image/jpg": "jpg",
          "image/png": "png",
          "image/gif": "gif",
          "image/webp": "webp",
          "image/svg+xml": "svg",
          "image/bmp": "bmp"
        };
        return map[(mimeType || "").toLowerCase()] || "bin";
      }

      function sanitizeFilename(filename) {
        const raw = String(filename || "file")
          .trim()
          .replace(/[\\/:*?"<>|]+/g, "-")
          .replace(/\s+/g, "-");
        return raw || "file";
      }

      function ensureUniqueFilename(filename, existing) {
        const used = new Set(existing || []);
        if (!used.has(filename)) return filename;

        const extension = extensionFromFilename(filename);
        const base = extension ? filename.slice(0, -(extension.length + 1)) : filename;
        let index = 2;
        let candidate = "";
        do {
          candidate = extension ? `${base}-${index}.${extension}` : `${base}-${index}`;
          index += 1;
        } while (used.has(candidate));
        return candidate;
      }

      function slugifyFilename(value) {
        return String(value || "book")
          .toLowerCase()
          .replace(/[^a-z0-9]+/g, "-")
          .replace(/^-+|-+$/g, "")
          .slice(0, 80) || "book";
      }

      function generateUuid() {
        if (window.crypto && typeof window.crypto.randomUUID === "function") {
          return window.crypto.randomUUID();
        }
        return "xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx".replace(/[xy]/g, (char) => {
          const random = Math.floor(Math.random() * 16);
          const value = char === "x" ? random : (random & 0x3) | 0x8;
          return value.toString(16);
        });
      }

      function stringOrEmpty(value) {
        return typeof value === "string" ? value : "";
      }

      function stringOrDefault(value, fallback) {
        return typeof value === "string" && value.trim() ? value : fallback;
      }
    })();
  </script>
</body>
</html>
